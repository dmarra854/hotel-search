# ─────────────────────────────────────────────────────────────────
# Profile: local
# Use when running the app from the IDE with infrastructure on Docker:
#   docker compose up postgres kafka zookeeper
# Then run: -Dspring.profiles.active=local
# ─────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hotelsearch
    username: hotelsearch
    password: hotelsearch

  kafka:
    bootstrap-servers: localhost:9093
    producer:
      acks: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        "delivery.timeout.ms": 120000
        "request.timeout.ms": 30000
        "linger.ms": 5
        "enable.idempotence": false