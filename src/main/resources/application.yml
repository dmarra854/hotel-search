spring:
  application:
    name: hotel-search

  # Virtual threads (Project Loom) — enables virtual thread executor for
  # Tomcat and Kafka listeners, improving I/O-bound throughput.
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/hotelsearch}
    username: ${DB_USER:hotelsearch}
    password: ${DB_PASSWORD:hotelsearch}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: hotel-search-group
      auto-offset-reset: earliest

hotel:
  search:
    kafka:
      topic: hotel_availability_searches

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
